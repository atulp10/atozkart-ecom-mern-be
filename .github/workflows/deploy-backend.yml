name: Deploy backend to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npx vitest run --testTimeout 20000

      - name: Create deployment ZIP
        run: |
          zip -r backend-deploy.zip \
            app.js \
            index.js \
            middlewares.js \
            package.json \
            package-lock.json \
            cloudinary \
            config \
            middlewares \
            model \
            routes \
            schemas \
            services \
            utils

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload deployment bundle to S3
        run: aws s3 cp backend-deploy.zip "s3://${{ secrets.EB_DEPLOY_BUCKET }}/backend/${GITHUB_SHA}.zip"

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --version-label "${GITHUB_SHA}" \
            --source-bundle S3Bucket="${{ secrets.EB_DEPLOY_BUCKET }}",S3Key="backend/${GITHUB_SHA}.zip"

      - name: Deploy Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --version-label "${GITHUB_SHA}"
